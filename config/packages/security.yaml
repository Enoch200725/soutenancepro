security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        admin_provider:
            entity:
                class: App\Entity\Admin
                property: email
        enseignant_provider:
            entity:
                class: App\Entity\Enseignant
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        administrateur:
            pattern: ^/administrateur
            lazy: true
            provider: admin_provider
            custom_authenticator: App\Security\AdminAuthenticator
            entry_point: App\Security\AdminAuthenticator
            logout:
                path: app_administrateur_logout
                target: app_administrateur_login

        enseignant:
            pattern: ^/enseignant
            lazy: true
            provider: enseignant_provider
            custom_authenticator: App\Security\EnseignantAuthenticator
            entry_point: App\Security\EnseignantAuthenticator
            logout:
                path: app_enseignant_logout
                target: app_enseignant_login

        main:
            lazy: true
            provider: admin_provider

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/administrateur/login, roles: PUBLIC_ACCESS }
        - { path: ^/administrateur, roles: ROLE_ADMIN }
        - { path: ^/enseignant/login, roles: PUBLIC_ACCESS }
        - { path: ^/enseignant, roles: ROLE_ENSEIGNANT }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon